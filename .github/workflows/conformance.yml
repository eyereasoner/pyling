name: Conformance tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rdf12:
    name: W3C RDF 1.2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Python package
        run: python -m pip install -e .

      - name: Install conformance runner
        run: npm ci

      - name: Run RDF 1.2 compliance tests
        run: npm run spec

  notation3:
    name: Notation3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Python package
        run: python -m pip install -e .

      - name: Run Notation3 tests
        run: python tools/run_notation3tests.py --clone
